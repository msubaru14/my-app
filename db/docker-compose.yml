version: "3.8"

services:
  db:
    image: postgres:15
    container_name: my-postgres
    restart: always
    env_file:
      - ../backend/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build: ../backend
    container_name: my-backend
    depends_on:
      - db
    ports:
      - "8080:8080"
    env_file:
      - ../backend/.env
    volumes:
      - ../backend:/app
    restart: always

  frontend:
    build: ../frontend
    container_name: my-frontend
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    stdin_open: true
    tty: true

volumes:
  postgres-data:
